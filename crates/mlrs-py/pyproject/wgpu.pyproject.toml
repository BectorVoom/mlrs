# mlrs wgpu-backend wheel (maturin multi-distribution template).
#
# All four per-backend templates (cpu/wgpu/cuda/rocm) are IDENTICAL except for
# `[project].name` and `[tool.maturin].features`. The constant
# `module-name = "mlrs._mlrs"` is what makes EVERY wheel expose `import mlrs`
# regardless of its distribution name (D-07). Path values are relative to the
# repo root, where maturin is invoked with `-m pyproject/<backend>.pyproject.toml`.
[build-system]
requires = ["maturin>=1.14,<2"]
build-backend = "maturin"

[project]
name = "mlrs-wgpu"
requires-python = ">=3.12"
dynamic = ["version"]
dependencies = ["numpy>2.0.0", "pyarrow>=14", "scikit-learn>=1.6"]

[tool.maturin]
manifest-path = "crates/mlrs-py/Cargo.toml"
module-name = "mlrs._mlrs"
python-source = "crates/mlrs-py/python"
features = ["wgpu"]
